name: Nightly Semver Advisory

# Advisory-mode cargo-semver-checks on a nightly schedule, not on PR.
# See plans/binary-bifurcation.md Phase A.4 Wave 2.
# Only sorla-provider-core is published (all other members have publish = false).

on:
  schedule:
    # 06:23 UTC — staggered to avoid hot-spots.
    - cron: "23 6 * * *"
  workflow_dispatch:
    inputs:
      baseline-rev:
        description: "Optional explicit baseline git ref (default: latest vX.Y.Z tag)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: nightly-semver-${{ github.ref }}
  cancel-in-progress: false

jobs:
  advisory:
    uses: greenticai/.github/.github/workflows/nightly-semver-advisory.yml@main
    with:
      semver-baseline-rev: ${{ inputs.baseline-rev || '' }}
      semver-checks-package: sorla-provider-core
