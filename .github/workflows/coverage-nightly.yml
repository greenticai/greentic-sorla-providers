name: Nightly Coverage

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          profile: minimal

      - name: Install binstall
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall

      - name: Install required binaries
        run: |
          if ! command -v greentic-dev >/dev/null 2>&1; then
            cargo binstall -y greentic-dev || cargo install --locked greentic-dev || true
          fi

      - name: Run coverage
        run: |
          if ! command -v greentic-dev >/dev/null 2>&1; then
            echo "greentic-dev not available in this environment."
            exit 1
          fi
          greentic-dev coverage

      - name: Verify coverage report exists
        run: |
          report_path=target/coverage/coverage.json
          if [[ ! -f "$report_path" ]]; then
            echo "Expected coverage report not found at $report_path"
            exit 1
          fi
          echo "Coverage report available at $report_path"
