name: Nightly Coverage

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install binstall
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-binstall

      - name: Install required binaries
        run: |
          if ! command -v greentic-dev >/dev/null 2>&1; then
            cargo binstall -y greentic-dev || cargo install --locked greentic-dev || true
          fi

      - name: Run coverage
        run: |
          if ! command -v greentic-dev >/dev/null 2>&1; then
            echo "greentic-dev not available in this environment."
            exit 1
          fi
          greentic-dev coverage

      - name: Enforce coverage policy
        run: |
          POLICY=coverage-policy.json
          if [[ ! -f "$POLICY" ]]; then
            echo "coverage-policy.json missing; coverage policy check skipped."
            exit 0
          fi

          if ! python3 - <<'PY'
          import json
          import pathlib

          policy_path = pathlib.Path('coverage-policy.json')
          with policy_path.open() as f:
              policy = json.load(f)

          for candidate in [
              'target/coverage/coverage.json',
              'coverage.json',
              'coverage-summary.json',
              '.coverage/report.json',
          ]:
              path = pathlib.Path(candidate)
              if path.exists():
                  report_path = path
                  break
          else:
              raise SystemExit('No coverage report file found for policy enforcement.')

          with report_path.open() as f:
              report = json.load(f)

          pct = (
              report.get('coverage_percent')
              or report.get('total', {}).get('coverage_percent')
              or report.get('totals', {}).get('lines', {}).get('percent')
          )
          if pct is None:
              raise SystemExit(f'Could not read total coverage from {report_path}')

          min_pct = (
              policy.get('minimum_coverage_percent')
              or policy.get('global', {}).get('line_coverage_min')
              or 0
          )
          if pct < min_pct:
              raise SystemExit(f'Coverage policy violation: {pct} < {min_pct}')
          PY
          then
            exit 1
          fi
