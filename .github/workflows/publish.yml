name: Publish

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider to build/publish, or 'all'"
        required: true
        default: "all"
      version_bump:
        description: "none | patch | minor | major"
        required: false
        default: "none"
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}-${{ github.event.inputs.provider || 'all' }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      provider: ${{ steps.selection.outputs.provider }}
      version_bump: ${{ steps.selection.outputs.version_bump }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          profile: minimal
          components: rustfmt, clippy
      - name: Select providers
        id: selection
        run: |
          echo "provider=${{ github.event.inputs.provider || 'all' }}" >> "$GITHUB_OUTPUT"
          echo "version_bump=${{ github.event.inputs.version_bump || 'none' }}" >> "$GITHUB_OUTPUT"
      - name: Apply provider version bump
        if: steps.selection.outputs.version_bump != 'none'
        run: |
          if [[ "${{ steps.selection.outputs.provider }}" == "all" ]]; then
            echo "version_bump requires a single provider, not 'all'."
            exit 1
          fi
          cargo xtask provider-version bump "${{ steps.selection.outputs.provider }}" "${{ steps.selection.outputs.version_bump }}"
      - name: Build provider matrix
        id: matrix
        run: |
          matrix=$(cargo xtask provider-matrix --provider "${{ steps.selection.outputs.provider }}")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "$matrix"
      - name: Run selected verification checks
        env:
          MATRIX: ${{ steps.matrix.outputs.matrix }}
        run: |
          cargo fmt --all -- --check
          cargo clippy -p sorla-provider-core -p sorla-provider-pack -p sorla-provider-catalog -p sorla-provider-catalog-cli -p xtask --all-targets --all-features -- -D warnings
          cargo test -p sorla-provider-core -p sorla-provider-pack -p sorla-provider-catalog -p sorla-provider-catalog-cli -p xtask --all-features

          echo "$MATRIX" | jq -r '.include[].package' | while IFS= read -r package; do
            cargo clippy -p "$package" --all-targets --all-features -- -D warnings
            cargo test -p "$package" --all-features
            cargo build -p "$package" --all-features
          done

  build-release-artifacts:
    needs:
      - verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          profile: minimal
      - name: Apply provider version bump
        if: needs.verify.outputs.version_bump != 'none'
        run: cargo xtask provider-version bump "${{ needs.verify.outputs.provider }}" "${{ needs.verify.outputs.version_bump }}"
      - name: Generate selected provider pack artifacts
        run: cargo run -p sorla-provider-pack-cli -- --provider "${{ needs.verify.outputs.provider }}"
      - name: Generate provider catalog
        run: cargo run -p sorla-provider-catalog-cli
      - name: Show provider versions
        run: |
          jq -r '.[] | "\(.provider_id) \(.provider_version) \(.oci_reference // "")"' examples/generated-packs/index.json
      - name: Upload generated release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: provider-release-artifacts
          path: |
            examples/generated-packs
            examples/generated-catalog/provider-catalog.json
          if-no-files-found: error

  publish-crates:
    if: github.event_name == 'push'
    needs:
      - verify
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          profile: minimal
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Publish crates to crates.io
        run: |
          run_publish_command_allow_existing() {
            local crate="$1"
            shift

            local output_file
            output_file=$(mktemp)

            if "$@" > >(tee "$output_file") 2> >(tee -a "$output_file" >&2); then
              rm -f "$output_file"
              return 0
            fi

            if grep -Fq "already exists on crates.io index" "$output_file"; then
              echo "Skipping $crate: version already exists on crates.io index"
              rm -f "$output_file"
              return 0
            fi

            rm -f "$output_file"
            return 1
          }

          if [[ -z "${CARGO_REGISTRY_TOKEN:-}" ]]; then
            echo "CARGO_REGISTRY_TOKEN is required for release."
            exit 1
          fi

          list=$(bash ci/local_check.sh --list-publishable)
          if [[ -z "$list" ]]; then
            echo "No publishable crates found."
            exit 1
          fi

          while IFS='|' read -r crate manifest; do
            if [[ -z "$crate" || -z "$manifest" ]]; then
              continue
            fi

            echo "Preparing $crate"
            run_publish_command_allow_existing "$crate" \
              cargo publish --manifest-path "$manifest" --dry-run

            attempts=0
            max_attempts=3
            while true; do
              if run_publish_command_allow_existing "$crate" \
                cargo publish --manifest-path "$manifest"; then
                break
              fi
              status=$?

              attempts=$((attempts + 1))
              if [[ $attempts -ge $max_attempts ]]; then
                echo "Publish failed after $attempts attempts for $crate"
                exit $status
              fi

              echo "Transient failure publishing $crate (attempt $attempts/$max_attempts). Retrying in 10s..."
              sleep 10
            done
          done <<<"$list"

  publish-oci:
    needs:
      - verify
      - build-release-artifacts
    runs-on: ubuntu-latest
    env:
      OCI_NAMESPACE: greenticai/sorla-providers
      OCI_REGISTRY: ghcr.io
      OCI_USERNAME: ${{ github.actor }}
      OCI_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      PROVIDER: ${{ needs.verify.outputs.provider }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          profile: minimal
      - name: Apply provider version bump
        if: needs.verify.outputs.version_bump != 'none'
        run: cargo xtask provider-version bump "${{ needs.verify.outputs.provider }}" "${{ needs.verify.outputs.version_bump }}"
      - name: Install ORAS
        uses: oras-project/setup-oras@v1
      - name: Publish OCI artifacts to GHCR
        run: bash ci/publish_oci_artifacts.sh

  publish-release-assets:
    if: github.event_name == 'push'
    needs:
      - verify
      - build-release-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: provider-release-artifacts
          path: examples
      - name: Prepare GitHub release assets
        run: |
          rm -rf release-assets
          mkdir -p release-assets

          cp examples/generated-packs/index.json release-assets/
          cp examples/generated-catalog/provider-catalog.json release-assets/

          find examples/generated-packs -mindepth 2 -maxdepth 2 -name '*.gtpack.json' -print | sort | while IFS= read -r pack_file; do
            provider_dir=$(basename "$(dirname "$pack_file")")
            cp "$pack_file" "release-assets/"
            cp "$(dirname "$pack_file")/manifest.json" "release-assets/${provider_dir}-manifest.json"
          done
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/*
