name: Perf (lightweight)

on:
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  # pull_request: removed per plans/binary-bifurcation.md Phase A heavy-job sweep

jobs:
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Run tests (including perf guards)
        run: cargo test --all --all-features

      - name: Run benchmarks (smoke)
        run: cargo bench -p sorla-provider-core --bench perf -- --sample-size 10
